<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="solid">
      <feDropShadow dx="0" dy="0" stdDeviation="0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0f172a"/>

  <!-- Dotted circle ring -->
  <circle cx="200" cy="130" r="60" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="2,8" opacity="0.8"/>
  <circle cx="200" cy="130" r="60" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="0.5,8.5" opacity="0.3"/>

  <!-- Camera aperture / gear icon -->
  <circle cx="200" cy="130" r="22" fill="none" stroke="#f1f5f9" stroke-width="2.5"/>
  <polygon points="200,108 209,122 227,119 215,132 220,150 203,140 185,150 190,132 178,119 196,122"
           fill="none" stroke="#f1f5f9" stroke-width="1.8" opacity="0.9"/>
  <circle cx="200" cy="130" r="6" fill="#6366f1"/>

  <!-- Horizontal accent line -->
  <line x1="130" y1="210" x2="270" y2="210" stroke="#334155" stroke-width="1"/>

  <!-- Decorative dot - left -->
  <circle cx="125" cy="210" r="3" fill="#6366f1" opacity="0.6"/>
  <!-- Decorative dot - right -->
  <circle cx="275" cy="210" r="3" fill="#6366f1" opacity="0.6"/>

  <!-- Text -->
  <text x="200" y="275" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="6">DEV</text>
  <text x="200" y="320" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="url(#neon)" text-anchor="middle" letter-spacing="6">FORGE</text>

  <!-- Tagline -->
  <text x="200" y="355" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="middle" letter-spacing="3">WEB DEVELOPMENT AGENCY</text>
</svg>
