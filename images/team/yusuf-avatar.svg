<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="url(#ring-grad)"/>
  <!-- White inner -->
  <circle cx="100" cy="100" r="93" fill="#fff"/>
  <!-- Head -->
  <ellipse cx="100" cy="105" rx="40" ry="46" fill="#e8c9a5"/>
  <!-- Hair (dark, neat) -->
  <path d="M60 92 Q60 50 80 48 Q100 40 120 48 Q140 50 140 92 Q138 72 128 66 Q115 60 100 62 Q85 60 72 66 Q62 72 60 92Z" fill="#1a1a2e"/>
  <!-- Eyebrows -->
  <path d="M78 88 Q88 84 94 88" stroke="#3d2b1a" stroke-width="2" fill="none"/>
  <path d="M106 88 Q112 84 122 88" stroke="#3d2b1a" stroke-width="2" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="96" rx="5" ry="4" fill="#3d2b1a"/>
  <ellipse cx="115" cy="96" rx="5" ry="4" fill="#3d2b1a"/>
  <circle cx="86" cy="95" r="1.5" fill="#fff"/>
  <circle cx="116" cy="95" r="1.5" fill="#fff"/>
  <!-- Glasses -->
  <circle cx="85" cy="96" r="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <circle cx="115" cy="96" r="10" fill="none" stroke="#475569" stroke-width="1.5"/>
  <line x1="95" y1="96" x2="105" y2="96" stroke="#475569" stroke-width="1.5"/>
  <!-- Nose -->
  <path d="M98 100 Q100 108 102 100" stroke="#c49a7a" stroke-width="1.5" fill="none"/>
  <!-- Smile -->
  <path d="M86 114 Q100 122 114 114" stroke="#c49a7a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Collar/shirt -->
  <path d="M75 148 L100 140 L125 148 L135 170 L65 170 Z" fill="#e2e8f0"/>
  <path d="M100 140 L100 170" stroke="#cbd5e1" stroke-width="1"/>
</svg>
