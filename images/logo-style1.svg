<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow3d">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="190" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Code background lines -->
  <text x="30" y="60" font-family="monospace" font-size="14" fill="#1e293b" opcity="0.6">function DevForge() {</text>
  <text x="50" y="85" font-family="monospace" font-size="13" fill="#1e293b" opacity="0.5">build();</text>
  <text x="50" y="105" font-family="monospace" font-size="13" fill="#1e293b" opacity="0.5">ship();</text>
  <text x="50" y="125" font-family="monospace" font-size="13" fill="#1e293b" opacity="0.5">scale();</text>
  <text x="30" y="148" font-family="monospace" font-size="14" fill="#1e293b" opacity="0.6">}</text>
  <text x="240" y="320" font-family="monospace" font-size="12" fill="#1e293b" opacity="0.4">src/</text>
  <text x="250" y="340" font-family="monospace" font-size="11" fill="#1e293b" opacity="0.3">components/</text>
  <text x="250" y="355" font-family="monospace" font-size="11" fill="#1e293b" opacity="0.3">lib/</text>
  <text x="250" y="370" font-family="monospace" font-size="11" fill="#1e293b" opacity="0.3">app.tsx</text>

  <!-- D letter - 3D metallic silver -->
  <path d="M145,120 L145,280 L210,280 Q245,280 245,240 Q245,210 225,195 Q210,182 190,178 L190,120 Z"
        fill="url(#silver)" filter="url(#shadow3d)" opacity="0.95"/>
  <path d="M160,140 L160,260 L205,260 Q225,260 225,240 Q225,215 210,205 Q195,195 180,192 L180,140 Z"
        fill="#0f172a"/>

  <!-- F letter - neon purple, interlocking -->
  <path d="M195,120 L195,190 L230,190 L230,210 L195,210 L195,240 L255,240 L255,260 L175,260 L175,120 Z"
        fill="url(#neon)" filter="url(#glow)" opacity="0.9"/>
  <path d="M210,120 L210,175 L240,175 L240,195 L210,195 L210,230 L245,230 L245,250 L190,250 L190,120 Z"
        fill="#0f172a" opacity="0.0"/>

  <!-- Glow behind F -->
  <path d="M195,115 L195,185 L235,185 L235,215 L195,215 L195,245 L260,245 L260,265 L175,265 L175,115 Z"
        fill="url(#neon)" opacity="0.15" filter="url(#glow)"/>

  <!-- Text -->
  <text x="200" y="340" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#f1f5f9" text-anchor="middle" letter-spacing="3">Dev</text>
  <text x="200" y="375" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#neon)" text-anchor="middle" letter-spacing="3">Forge</text>
</svg>
