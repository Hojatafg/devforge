<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-grad)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="50" x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
  </g>
  <!-- Laptop icon -->
  <rect x="175" y="80" width="250" height="165" rx="12" fill="#1e293b" stroke="url(#accent)" stroke-width="2"/>
  <rect x="185" y="95" width="230" height="125" rx="4" fill="#0f172a"/>
  <rect x="185" y="95" width="230" height="125" rx="4" fill="url(#accent)" opacity="0.05"/>
  <!-- Screen content (simulated web page) -->
  <rect x="200" y="108" width="80" height="10" rx="2" fill="#6366f1" opacity="0.6"/>
  <rect x="200" y="125" width="200" height="6" rx="2" fill="#475569"/>
  <rect x="200" y="140" width="180" height="6" rx="2" fill="#334155"/>
  <rect x="200" y="155" width="160" height="6" rx="2" fill="#334155"/>
  <rect x="200" y="170" width="190" height="6" rx="2" fill="#334155"/>
  <rect x="200" y="185" width="100" height="20" rx="3" fill="#6366f1" opacity="0.4"/>
  <!-- Laptop base -->
  <rect x="160" y="245" width="280" height="8" rx="4" fill="#334155"/>
  <path d="M160 253 Q200 270 300 270 Q400 270 440 253" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Code bracket decoration -->
  <text x="100" y="200" font-family="monospace" font-size="12" fill="#6366f1" opacity="0.15">&lt;/&gt;</text>
  <text x="485" y="200" font-family="monospace" font-size="12" fill="#06b6d4" opacity="0.15">{ }</text>
  <!-- Floating dots -->
  <circle cx="80" cy="80" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="520" cy="90" r="2" fill="#06b6d4" opacity="0.3"/>
  <circle cx="550" cy="300" r="1.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="50" cy="320" r="1.5" fill="#06b6d4" opacity="0.2"/>
  <circle cx="300" cy="60" r="1.5" fill="#fff" opacity="0.1"/>
  <!-- Text -->
  <text x="300" y="320" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#f1f5f9">Web Development</text>
  <text x="300" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Modern websites, systems and digital launches</text>
  <!-- Badge -->
  <rect x="225" y="360" width="150" height="24" rx="12" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
  <text x="300" y="377" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#6366f1" font-weight="600">DEVFORGE</text>
</svg>
