<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <!-- Background circle base -->
  <circle cx="75" cy="60" r="48" fill="#1e293b" opacity="0.5"/>

  <!-- Glass layer 1: Diamond shape - rotated square -->
  <polygon points="75,15 115,60 75,105 35,60"
           fill="url(#grad1)" opacity="0.25"
           stroke="url(#grad1)" stroke-width="0.5"/>

  <!-- Glass layer 2: Circle -->
  <circle cx="75" cy="60" r="38"
          fill="url(#grad2)" opacity="0.2"
          stroke="url(#grad2)" stroke-width="0.5"/>

  <!-- Glass layer 3: Hexagon -->
  <polygon points="75,22 107,41 107,79 75,98 43,79 43,41"
           fill="url(#grad3)" opacity="0.15"
           stroke="url(#grad3)" stroke-width="0.5"/>

  <!-- Inner highlight/gloss -->
  <ellipse cx="65" cy="45" rx="20" ry="12" fill="white" opacity="0.08"/>
  <ellipse cx="65" cy="45" rx="12" ry="7" fill="white" opacity="0.06"/>

  <!-- Accent diamond at intersection -->
  <polygon points="75,50 82,60 75,70 68,60"
           fill="url(#grad1)" opacity="0.6"/>

  <!-- Subtle border glow -->
  <circle cx="75" cy="60" r="48"
          fill="none"
          stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>

  <!-- Text -->
  <text x="155" y="52" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="800" fill="#f1f5f9" letter-spacing="-0.5">Dev</text>
  <text x="155" y="90" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="800" fill="url(#grad1)" letter-spacing="-0.5">Forge</text>
</svg>
