<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#0f172a"/>
  <!-- Pizza icon -->
  <circle cx="300" cy="160" r="80" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <circle cx="300" cy="160" r="65" fill="#2d1b00"/>
  <circle cx="300" cy="160" r="55" fill="#3d2200"/>
  <!-- Pepperoni -->
  <circle cx="280" cy="140" r="8" fill="#8b2500"/>
  <circle cx="320" cy="150" r="7" fill="#8b2500"/>
  <circle cx="290" cy="175" r="6" fill="#8b2500"/>
  <circle cx="310" cy="130" r="5" fill="#8b2500"/>
  <circle cx="270" cy="160" r="6" fill="#8b2500"/>
  <circle cx="330" cy="170" r="5" fill="#8b2500"/>
  <!-- Cheese stretches -->
  <line x1="280" y1="180" x2="310" y2="200" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
  <!-- Slices -->
  <line x1="300" y1="160" x2="300" y2="80" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="160" x2="370" y2="190" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <line x1="300" y1="160" x2="240" y2="210" stroke="#6366f1" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="300" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#f1f5f9">Johnny's Pizza</text>
  <text x="300" y="305" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#94a3b8">Restaurant Website Concept</text>
  <!-- Badge -->
  <rect x="240" y="320" width="120" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="300" y="339" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#f59e0b" text-transform="uppercase">CONCEPT PROJECT</text>
  <!-- Code bracket decoration -->
  <path d="M 160 360 Q 140 340 160 320" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M 440 360 Q 460 340 440 320" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Subtle grid dots -->
  <circle cx="40" cy="40" r="1" fill="#6366f1" opacity="0.15"/>
  <circle cx="560" cy="40" r="1" fill="#6366f1" opacity="0.15"/>
  <circle cx="40" cy="360" r="1" fill="#6366f1" opacity="0.15"/>
  <circle cx="560" cy="360" r="1" fill="#6366f1" opacity="0.15"/>
</svg>
