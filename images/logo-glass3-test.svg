<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="fold2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <ellipse cx="65" cy="60" rx="44" ry="44" fill="none" stroke="url(#g1)" stroke-width="1.5"/>
  <ellipse cx="65" cy="60" rx="38" ry="38" fill="url(#g1)" stroke="url(#g2)" stroke-width="0.5"/>
  <ellipse cx="65" cy="60" rx="30" ry="30" fill="url(#g2)" stroke="url(#g1)" stroke-width="0.5"/>
  <ellipse cx="55" cy="48" rx="15" ry="6" fill="white" opacity="0.05" transform="rotate(-20,55,48)"/>
  <!-- MODERN CENTER: Folded ribbon / 3D geometric knot -->
  <path d="M55,55 Q60,50 65,55 Q70,60 75,55 Q80,50 75,45 Q70,40 65,45"
        fill="none" stroke="url(#fold)" stroke-width="3" stroke-linecap="round" opacity="0.9" filter="url(#glow3)"/>
  <path d="M55,65 Q60,70 65,65 Q70,60 75,65 Q80,70 75,75 Q70,80 65,75"
        fill="none" stroke="url(#fold2)" stroke-width="3" stroke-linecap="round" opacity="0.7" filter="url(#glow3)"/>
  <!-- Connector -->
  <line x1="65" y1="55" x2="65" y2="65" stroke="url(#fold)" stroke-width="2" opacity="0.5"/>
  <text x="135" y="52" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="#f1f5f9">Dev</text>
  <text x="135" y="84" font-family="Inter, sans-serif" font-size="32" font-weight="800" fill="url(#gtext)">Forge</text>
</svg>
